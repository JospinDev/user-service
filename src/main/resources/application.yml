spring:
  application:
    name: user_service

  datasource:
    url: jdbc:mariadb://localhost:3306/user_service?createDatabaseIfNotExist=true
    username: root
    password: 789
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
        "[hibernate.format_sql]": true
        "[hibernate.use_sql_comments]": true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /user_service

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha